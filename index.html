<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>Misión Espacial 5:22</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;}
#app{
  width:100%;min-height:100vh;
  background:radial-gradient(ellipse at 30% 20%,#0d0d3a 0%,#000010 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem 1rem;position:relative;overflow:hidden;
  font-family:'Courier New',monospace;
}
.stars{position:absolute;inset:0;pointer-events:none;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes scanline{0%{top:0%}100%{top:100%}}
@keyframes pulse-idle{
  0%{box-shadow:0 0 0 0 rgba(0,180,255,.5)}
  70%{box-shadow:0 0 0 18px rgba(0,180,255,0)}
  100%{box-shadow:0 0 0 0 rgba(0,180,255,0)}
}
@keyframes pulse-success{
  0%{box-shadow:0 0 0 0 rgba(0,255,136,.7)}
  70%{box-shadow:0 0 0 25px rgba(0,255,136,0)}
  100%{box-shadow:0 0 0 0 rgba(0,255,136,0)}
}
@keyframes badge-appear{
  0%{transform:scale(0) rotate(-12deg);opacity:0}
  60%{transform:scale(1.08) rotate(2deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes particle-fly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}
@keyframes glow-text{
  0%,100%{text-shadow:0 0 8px currentColor}
  50%{text-shadow:0 0 22px currentColor,0 0 40px currentColor}
}
@keyframes logo-glow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(100,200,255,.6))}
  50%{filter:drop-shadow(0 0 22px rgba(100,200,255,1)) drop-shadow(0 0 40px rgba(80,255,200,.5))}
}
@keyframes rocket-fly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(60px,-220px) scale(0.2);opacity:0}
}
.logo-area{
  animation:float 4s ease-in-out infinite,logo-glow 3s ease-in-out infinite;
  margin-bottom:1.2rem;text-align:center;
}
.logo-area img{width:280px;max-width:82vw;}
.scanner-wrap{position:relative;width:210px;height:210px;margin:0.5rem 0;}
.hand-zone{
  width:210px;height:210px;border-radius:50%;
  border:3px solid #00b4ff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  background:rgba(0,40,80,.35);
  animation:pulse-idle 2.5s ease-in-out infinite;
  transition:border-color .2s,box-shadow .2s;
  user-select:none;overflow:hidden;
}
.hand-zone.scanning{border-color:#ffcc00;animation:none;box-shadow:0 0 28px rgba(255,204,0,.5);}
.hand-zone.success{border-color:#00ff88;animation:pulse-success .8s ease-in-out 4;box-shadow:0 0 40px rgba(0,255,136,.6);}
.scan-line{
  display:none;position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#ffcc00,transparent);top:0;
}
.hand-zone.scanning .scan-line{display:block;animation:scanline .55s linear infinite;}
.hand-icon{font-size:4.2rem;position:relative;z-index:2;pointer-events:none;}
.progress-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:196px;height:196px;pointer-events:none;}
.progress-circle{
  fill:none;stroke:#ffcc00;stroke-width:5;stroke-linecap:round;
  stroke-dasharray:615;stroke-dashoffset:615;
  transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset .04s linear;
}
.corner{position:absolute;width:18px;height:18px;border-color:#00b4ff;border-style:solid;opacity:.7;}
.corner.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.corner.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.instruction{
  color:#aabbcc;font-size:.7rem;letter-spacing:2px;
  text-align:center;margin-top:.6rem;min-height:1.1rem;text-transform:uppercase;
}
.status-bar{
  margin-top:1.2rem;width:250px;
  background:rgba(0,15,35,.85);border:1px solid #003355;
  border-radius:8px;padding:.7rem 1rem;font-size:.62rem;letter-spacing:1.5px;color:#557799;
}
.status-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ff88;margin-right:5px;vertical-align:middle;animation:twinkle 1.5s linear infinite;}
.sdot.y{background:#ffcc00}.sdot.b{background:#00b4ff}
.result-overlay{
  display:none;position:fixed;inset:0;
  align-items:center;justify-content:center;flex-direction:column;
  z-index:100;background:rgba(0,255,136,.12);
}
.result-overlay.show{display:flex;}
.result-card{
  background:rgba(0,8,25,.97);border-radius:20px;padding:2rem 2.5rem;
  text-align:center;border:2px solid #00ff88;
  box-shadow:0 0 60px rgba(0,255,136,.35);
  animation:badge-appear .5s cubic-bezier(.34,1.56,.64,1) forwards;
  color:#00ff88;position:relative;z-index:101;max-width:90vw;
}
.result-icon{font-size:3.5rem;margin-bottom:.4rem;}
.result-rocket{display:inline-block;}
.result-title{font-size:1.3rem;font-weight:bold;letter-spacing:3px;margin-bottom:.3rem;animation:glow-text 1.5s ease-in-out infinite;}
.result-sub{font-size:.68rem;letter-spacing:2px;opacity:.85;margin-top:.2rem;}
.result-mission{font-size:.6rem;letter-spacing:2px;opacity:.6;margin-top:.4rem;color:#00d4ff;}
.particles-container{position:fixed;inset:0;pointer-events:none;z-index:99;}
.particle{position:absolute;border-radius:50%;animation:particle-fly .9s ease-out forwards;}
.mute-btn{
  position:absolute;top:12px;right:14px;
  background:rgba(0,30,60,.7);border:1px solid #003355;
  color:#aabbcc;border-radius:20px;padding:8px 14px;
  font-size:.7rem;letter-spacing:1px;cursor:pointer;
  font-family:'Courier New',monospace;text-transform:uppercase;
  transition:color .2s,border-color .2s;
}
.mute-btn:hover{color:#00b4ff;border-color:#00b4ff;}
</style>
</head>
<body>
<div id="app">
  <div class="stars" id="stars"></div>
  <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 Sonido</button>
  <div class="logo-area">
    <img id="logoImg" alt="Camp Niños 2026 - Misión Espacial 5:22"/>
  </div>
  <div class="scanner-wrap">
    <div class="hand-zone" id="handZone"
         ontouchstart="startScan(event)" onmousedown="startScan(event)">
      <div class="scan-line"></div>
      <svg class="progress-ring" viewBox="0 0 196 196">
        <circle class="progress-circle" id="progressCircle" cx="98" cy="98" r="94"/>
      </svg>
      <span class="hand-icon" id="handIcon">✋</span>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
  </div>
  <div class="instruction" id="instruction">Apoya tu mano en el escáner</div>
  <div class="status-bar">
    <div class="status-row"><span><span class="sdot"></span>BIOMÉTRICO</span><span style="color:#00ff88">ACTIVO</span></div>
    <div class="status-row"><span><span class="sdot y"></span>SEGURIDAD</span><span style="color:#ffcc00">NIVEL 5</span></div>
    <div class="status-row"><span><span class="sdot b"></span>MISIÓN</span><span style="color:#00b4ff">ESPACIAL 5:22</span></div>
  </div>
</div>
<div class="result-overlay" id="resultOverlay">
  <div class="particles-container" id="particlesContainer"></div>
  <div class="result-card">
    <div class="result-icon"><span class="result-rocket" id="resultRocket">🚀</span></div>
    <div class="result-title">¡ASTRONAUTA VERIFICADO!</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="result-mission">MISIÓN ESPACIAL 5:22 · GÁL 5:22-23</div>
  </div>
</div>

function startScan(e){
  e.preventDefault();
  if(!canScan||isScanning)return;
  startAmbient();isScanning=true;scanStart=Date.now();
  document.getElementById('handZone').classList.add('scanning');
  document.getElementById('handIcon').textContent='🖐';
  document.getElementById('instruction').textContent='Escaneando... no muevas la mano';
  startScanSound();
  progInterval=setInterval(function(){
    document.getElementById('progressCircle').style.strokeDashoffset=615*(1-Math.min((Date.now()-scanStart)/HOLD_MS,1));
  },30);
  scanTimer=setTimeout(function(){clearInterval(progInterval);stopScanSound();showApproved();},HOLD_MS);
  document.addEventListener('mouseup',cancelScan);
  document.addEventListener('touchend',cancelScan);
  document.addEventListener('touchcancel',cancelScan);
}

function cancelScan(){
  if(!isScanning)return;
  clearTimeout(scanTimer);clearInterval(progInterval);stopScanSound();isScanning=false;
  document.getElementById('progressCircle').style.strokeDashoffset=615;
  document.getElementById('handZone').classList.remove('scanning');
  document.getElementById('handIcon').textContent='✋';
  document.getElementById('instruction').textContent='Apoya tu mano en el escáner';
  document.removeEventListener('mouseup',cancelScan);
  document.removeEventListener('touchend',cancelScan);
  document.removeEventListener('touchcancel',cancelScan);
}

function showApproved(){
  isScanning=false;canScan=false;
  document.removeEventListener('mouseup',cancelScan);
  document.removeEventListener('touchend',cancelScan);
  const zone=document.getElementById('handZone'),circle=document.getElementById('progressCircle');
  circle.style.strokeDashoffset=0;circle.style.stroke='#00ff88';
  zone.classList.remove('scanning');zone.classList.add('success');
  document.getElementById('handIcon').textContent='🖐';
  document.getElementById('instruction').textContent='¡Identidad confirmada!';
  playRocketSound();spawnParticles();
  const title=TITLES[Math.floor(Math.random()*TITLES.length)];
  const id=String(Math.floor(Math.random()*900)+100);
  document.getElementById('resultSub').textContent=title+' · ID-'+id+' · ACCESO CONCEDIDO';
  const rocket=document.getElementById('resultRocket');
  rocket.style.animation='none';
  setTimeout(function(){
    document.getElementById('resultOverlay').classList.add('show');
    void rocket.offsetWidth;
    rocket.style.animation='rocket-fly 1.2s ease-in forwards';
    setTimeout(function(){
      document.getElementById('resultOverlay').classList.remove('show');
      setTimeout(resetScanner,400);
    },2800);
  },250);
}

function spawnParticles(){
  const pc=document.getElementById('particlesContainer');
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const cols=['#00ff88','#00d4ff','#ffcc00','#ffffff','#88ffcc','#ff88ff'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=(Math.PI*2*i)/30+Math.random()*.4,dist=70+Math.random()*150,sz=4+Math.random()*8;
    const col=cols[Math.floor(Math.random()*cols.length)];
    p.style.cssText='left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+sz+'px;background:'+col+';--dx:'+Math.cos(angle)*dist+'px;--dy:'+Math.sin(angle)*dist+'px;animation-duration:'+(0.7+Math.random()*.5)+'s;animation-delay:'+(Math.random()*.15)+'s';
    pc.appendChild(p);setTimeout(function(){p.remove();},1400);
  }
}

function resetScanner(){
  canScan=true;isScanning=false;
  const zone=document.getElementById('handZone'),circle=document.getElementById('progressCircle');
  zone.classList.remove('scanning','success');
  circle.style.strokeDashoffset=615;circle.style.stroke='#ffcc00';
  document.getElementById('handIcon').textContent='✋';
  document.getElementById('instruction').textContent='Apoya tu mano en el escáner';
}
</script>
</body>
