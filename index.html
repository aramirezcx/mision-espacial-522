<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>Misión Espacial 5:22 — Verificador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#app{
  width:100%;height:100%;min-height:100vh;
  background:radial-gradient(ellipse at 30% 20%,#0d0d3a 0%,#000010 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem 1rem;position:relative;overflow:hidden;
  font-family:'Courier New',monospace;
}
.stars{position:absolute;inset:0;pointer-events:none;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes scanline{0%{top:0%}100%{top:100%}}
@keyframes pulse-idle{
  0%{box-shadow:0 0 0 0 rgba(0,180,255,.5)}
  70%{box-shadow:0 0 0 18px rgba(0,180,255,0)}
  100%{box-shadow:0 0 0 0 rgba(0,180,255,0)}
}
@keyframes pulse-success{
  0%{box-shadow:0 0 0 0 rgba(0,255,136,.7)}
  70%{box-shadow:0 0 0 25px rgba(0,255,136,0)}
  100%{box-shadow:0 0 0 0 rgba(0,255,136,0)}
}
@keyframes badge-appear{
  0%{transform:scale(0) rotate(-12deg);opacity:0}
  60%{transform:scale(1.08) rotate(2deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes particle-fly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}
@keyframes glow-text{
  0%,100%{text-shadow:0 0 8px currentColor}
  50%{text-shadow:0 0 22px currentColor,0 0 40px currentColor}
}
@keyframes logo-glow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(100,200,255,.5))}
  50%{filter:drop-shadow(0 0 20px rgba(100,200,255,.9)) drop-shadow(0 0 40px rgba(80,255,200,.4))}
}
@keyframes rocket-fly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(60px,-220px) scale(0.2);opacity:0}
}
.logo-area{
  animation:float 4s ease-in-out infinite,logo-glow 3s ease-in-out infinite;
  margin-bottom:1.2rem;text-align:center;
}
.logo-area img{width:260px;max-width:80vw;border-radius:12px;}
.scanner-wrap{position:relative;width:210px;height:210px;margin:0.5rem 0;}
.hand-zone{
  width:210px;height:210px;border-radius:50%;
  border:3px solid #00b4ff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  background:rgba(0,40,80,.35);
  animation:pulse-idle 2.5s ease-in-out infinite;
  transition:border-color .2s,box-shadow .2s;
  user-select:none;overflow:hidden;
}
.hand-zone.scanning{border-color:#ffcc00;animation:none;box-shadow:0 0 28px rgba(255,204,0,.5);}
.hand-zone.success{border-color:#00ff88;animation:pulse-success .8s ease-in-out 4;box-shadow:0 0 40px rgba(0,255,136,.6);}
.scan-line{
  display:none;position:absolute;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#ffcc00,transparent);top:0;
}
.hand-zone.scanning .scan-line{display:block;animation:scanline .55s linear infinite;}
.hand-icon{font-size:4.2rem;position:relative;z-index:2;pointer-events:none;transition:transform .3s;}
.progress-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:196px;height:196px;pointer-events:none;}
.progress-circle{
  fill:none;stroke:#ffcc00;stroke-width:5;stroke-linecap:round;
  stroke-dasharray:615;stroke-dashoffset:615;
  transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset .04s linear;
}
.corner{position:absolute;width:18px;height:18px;border-color:#00b4ff;border-style:solid;opacity:.7;}
.corner.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.corner.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.instruction{
  color:#aabbcc;font-size:.7rem;letter-spacing:2px;
  text-align:center;margin-top:.6rem;min-height:1.1rem;text-transform:uppercase;
}
.status-bar{
  margin-top:1.2rem;width:250px;
  background:rgba(0,15,35,.85);border:1px solid #003355;
  border-radius:8px;padding:.7rem 1rem;font-size:.62rem;letter-spacing:1.5px;color:#557799;
}
.status-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.sdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ff88;margin-right:5px;vertical-align:middle;animation:twinkle 1.5s linear infinite;}
.sdot.y{background:#ffcc00}.sdot.b{background:#00b4ff}
.result-overlay{
  display:none;position:fixed;inset:0;
  align-items:center;justify-content:center;flex-direction:column;
  z-index:100;background:rgba(0,255,136,.12);
}
.result-overlay.show{display:flex;}
.result-card{
  background:rgba(0,8,25,.97);border-radius:20px;padding:2rem 2.5rem;
  text-align:center;border:2px solid #00ff88;
  box-shadow:0 0 60px rgba(0,255,136,.35);
  animation:badge-appear .5s cubic-bezier(.34,1.56,.64,1) forwards;
  color:#00ff88;position:relative;z-index:101;max-width:90vw;
}
.result-icon{font-size:3.5rem;margin-bottom:.4rem;}
.result-rocket{
  display:inline-block;font-size:3rem;
  animation:rocket-fly 1.2s ease-in forwards;
  animation-delay:.2s;
}
.result-title{font-size:1.3rem;font-weight:bold;letter-spacing:3px;margin-bottom:.3rem;animation:glow-text 1.5s ease-in-out infinite;}
.result-sub{font-size:.68rem;letter-spacing:2px;opacity:.85;margin-top:.2rem;}
.result-mission{font-size:.6rem;letter-spacing:2px;opacity:.6;margin-top:.4rem;color:#00d4ff;}
.particles-container{position:fixed;inset:0;pointer-events:none;z-index:99;}
.particle{position:absolute;border-radius:50%;animation:particle-fly .9s ease-out forwards;}
.mute-btn{
  position:absolute;top:12px;right:14px;
  background:rgba(0,30,60,.7);border:1px solid #003355;
  color:#557799;border-radius:20px;padding:6px 12px;
  font-size:.65rem;letter-spacing:1px;cursor:pointer;
  font-family:'Courier New',monospace;text-transform:uppercase;
}
</style>
</head>

<div id="app">

  <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊 Sonido</button>

  <div class="logo-area">
    <img id="logoImg" alt="Camp Niños 2026 - Misión Espacial 5:22"/>

    <div class="status-row"><span><span class="sdot b"></span>MISIÓN</span><span style="color:#00b4ff">ESPACIAL 5:22</span></div>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="particles-container" id="particlesContainer"></div>

    <div class="result-sub" id="resultSub"></div>

</div>

function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  return actx;
}

// ── AMBIENT ──
let ambientStarted=false;
function startAmbient(){
  if(muted||ambientStarted) return;
  ambientStarted=true;
  try{
    const ac=getCtx();
    const master=ac.createGain();
    master.gain.setValueAtTime(0,ac.currentTime);
    master.gain.linearRampToValueAtTime(0.18,ac.currentTime+3);
    master.connect(ac.destination);

    // Deep pad
    [55,55.3,82.5,110,110.4].forEach((f,i)=>{
      const osc=ac.createOscillator(),g=ac.createGain();
      osc.type='sine';osc.frequency.value=f;g.gain.value=0.12;
      const vib=ac.createOscillator(),vibG=ac.createGain();
      vib.frequency.value=0.05+i*0.02;vibG.gain.value=0.4;
      vib.connect(vibG);vibG.connect(osc.frequency);vib.start();
      osc.connect(g);g.connect(master);osc.start();
    });

    // Wind noise
    const bufSize=ac.sampleRate*3;
    const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i]=Math.random()*2-1;
    const noise=ac.createBufferSource();
    noise.buffer=buf;noise.loop=true;
    const bpf=ac.createBiquadFilter();
    bpf.type='bandpass';bpf.frequency.value=180;bpf.Q.value=0.4;
    const noiseG=ac.createGain();noiseG.gain.value=0.04;
    noise.connect(bpf);bpf.connect(noiseG);noiseG.connect(master);
    noise.start();
    (function sweep(){
      const t=ac.currentTime;
      bpf.frequency.cancelScheduledValues(t);
      bpf.frequency.setValueAtTime(bpf.frequency.value,t);
      bpf.frequency.linearRampToValueAtTime(100+Math.random()*300,t+10);
      setTimeout(sweep,10000);
    })();

    // Melodic chimes
    const scale=[261.63,293.66,329.63,392,440,523.25];
    let ni=0;
    function sched(){
      if(muted) return;
      const ac2=getCtx();
      const freq=scale[ni%scale.length];ni++;
      const osc=ac2.createOscillator(),env=ac2.createGain();
      osc.type='triangle';
      osc.frequency.value=freq*(Math.random()>.7?2:1);
      const t=ac2.currentTime;
      env.gain.setValueAtTime(0,t);
      env.gain.linearRampToValueAtTime(0.055,t+0.15);
      env.gain.exponentialRampToValueAtTime(0.001,t+2.2);
      osc.connect(env);env.connect(master);osc.start(t);osc.stop(t+2.4);
      const osc2=ac2.createOscillator(),env2=ac2.createGain();
      osc2.type='sine';osc2.frequency.value=freq*(Math.random()>.5?2:.5);
      env2.gain.setValueAtTime(0,t+.08);
      env2.gain.linearRampToValueAtTime(0.022,t+.3);
      env2.gain.exponentialRampToValueAtTime(0.001,t+3);
      osc2.connect(env2);env2.connect(master);osc2.start(t+.08);osc2.stop(t+3.1);
      setTimeout(sched,1800+Math.random()*2200);
    }
    setTimeout(sched,1200);

    // Whooshes & blips
    function schedWhoosh(){
      if(muted) return;
      setTimeout(()=>{
        try{
          const ac3=getCtx();
          if(Math.random()>.5){
            const bsz=ac3.sampleRate*1.2,wb=ac3.createBuffer(1,bsz,ac3.sampleRate);
            const wd=wb.getChannelData(0);
            for(let i=0;i<bsz;i++) wd[i]=Math.random()*2-1;
            const ws=ac3.createBufferSource();ws.buffer=wb;
            const wf=ac3.createBiquadFilter();wf.type='bandpass';wf.Q.value=2;
            wf.frequency.setValueAtTime(300,ac3.currentTime);
            wf.frequency.linearRampToValueAtTime(2000,ac3.currentTime+.6);
            wf.frequency.linearRampToValueAtTime(200,ac3.currentTime+1.2);
            const wg=ac3.createGain();
            wg.gain.setValueAtTime(0,ac3.currentTime);
            wg.gain.linearRampToValueAtTime(.06,ac3.currentTime+.2);
            wg.gain.linearRampToValueAtTime(0,ac3.currentTime+1.2);
            ws.connect(wf);wf.connect(wg);wg.connect(master);
            ws.start();ws.stop(ac3.currentTime+1.3);
          } else {
            [880,1100].forEach((f,i)=>{
              const o=ac3.createOscillator(),g=ac3.createGain();
              o.type='sine';o.frequency.value=f;
              const t=ac3.currentTime+i*.18;
              g.gain.setValueAtTime(0,t);
              g.gain.linearRampToValueAtTime(.045,t+.02);
              g.gain.exponentialRampToValueAtTime(.001,t+.14);
              o.connect(g);g.connect(master);o.start(t);o.stop(t+.16);
            });
          }
        } catch(e){}
        schedWhoosh();
      },4000+Math.random()*7000);
    }
    schedWhoosh();
  } catch(e){}
}

// ── SCAN SOUND: warm melodic hum ──
function startScanSound(){
  if(muted) return;
  try{
    const ac=getCtx();
    scanOsc=ac.createOscillator();
    scanOsc2=ac.createOscillator();
    scanGain=ac.createGain();
    scanGain2=ac.createGain();
    scanOsc.type='triangle';
    scanOsc2.type='sine';
    scanOsc.frequency.setValueAtTime(330,ac.currentTime);
    scanOsc.frequency.linearRampToValueAtTime(660,ac.currentTime+HOLD_MS/1000);
    scanOsc2.frequency.setValueAtTime(495,ac.currentTime);
    scanOsc2.frequency.linearRampToValueAtTime(990,ac.currentTime+HOLD_MS/1000);
    scanGain.gain.setValueAtTime(0,ac.currentTime);
    scanGain.gain.linearRampToValueAtTime(.10,ac.currentTime+.08);
    scanGain2.gain.setValueAtTime(0,ac.currentTime);
    scanGain2.gain.linearRampToValueAtTime(.04,ac.currentTime+.08);
    scanTrem=ac.createOscillator();
    const tremG=ac.createGain();tremG.gain.value=.03;
    scanTrem.frequency.value=6;
    scanTrem.connect(tremG);tremG.connect(scanGain.gain);
    scanTrem.start();
    scanOsc.connect(scanGain);scanGain.connect(ac.destination);
    scanOsc2.connect(scanGain2);scanGain2.connect(ac.destination);
    scanOsc.start();scanOsc2.start();
  } catch(e){}
}

function stopScanSound(){
  try{
    if(scanOsc){
      const ac=getCtx();
      const t=ac.currentTime;
      scanGain.gain.setValueAtTime(scanGain.gain.value,t);
      scanGain.gain.linearRampToValueAtTime(0,t+.05);
      scanGain2.gain.setValueAtTime(scanGain2.gain.value,t);
      scanGain2.gain.linearRampToValueAtTime(0,t+.05);
      scanTrem&&scanTrem.stop(t+.06);
      scanOsc.stop(t+.06);
      scanOsc2&&scanOsc2.stop(t+.06);
      scanOsc=null;scanOsc2=null;scanGain=null;scanGain2=null;scanTrem=null;
    }
  } catch(e){}
}

// ── ROCKET LAUNCH SOUND ──
function playRocketSound(){
  if(muted) return;
  try{
    const ac=getCtx();
    const master=ac.createGain();
    master.gain.value=1;
    master.connect(ac.destination);

    // 1) Rumble: low filtered noise that builds and fades
    const rBuf=ac.createBuffer(1,ac.sampleRate*2.5,ac.sampleRate);
    const rData=rBuf.getChannelData(0);
    for(let i=0;i<rData.length;i++) rData[i]=Math.random()*2-1;
    const rumble=ac.createBufferSource();rumble.buffer=rBuf;
    const rLPF=ac.createBiquadFilter();rLPF.type='lowpass';
    rLPF.frequency.setValueAtTime(80,ac.currentTime);
    rLPF.frequency.linearRampToValueAtTime(300,ac.currentTime+1.0);
    rLPF.frequency.linearRampToValueAtTime(600,ac.currentTime+2.0);
    const rGain=ac.createGain();
    rGain.gain.setValueAtTime(0,ac.currentTime);
    rGain.gain.linearRampToValueAtTime(.35,ac.currentTime+.15);
    rGain.gain.linearRampToValueAtTime(.5,ac.currentTime+.8);
    rGain.gain.linearRampToValueAtTime(.15,ac.currentTime+2.3);
    rGain.gain.linearRampToValueAtTime(0,ac.currentTime+2.5);
    rumble.connect(rLPF);rLPF.connect(rGain);rGain.connect(master);
    rumble.start();

    // 2) Hiss: high-pass noise for engine exhaust
    const hBuf=ac.createBuffer(1,ac.sampleRate*2.5,ac.sampleRate);
    const hData=hBuf.getChannelData(0);
    for(let i=0;i<hData.length;i++) hData[i]=Math.random()*2-1;
    const hiss=ac.createBufferSource();hiss.buffer=hBuf;
    const hHPF=ac.createBiquadFilter();hHPF.type='highpass';
    hHPF.frequency.setValueAtTime(1200,ac.currentTime);
    hHPF.frequency.linearRampToValueAtTime(3000,ac.currentTime+1.5);
    const hGain=ac.createGain();
    hGain.gain.setValueAtTime(0,ac.currentTime);
    hGain.gain.linearRampToValueAtTime(.08,ac.currentTime+.1);
    hGain.gain.linearRampToValueAtTime(.12,ac.currentTime+.6);
    hGain.gain.linearRampToValueAtTime(0,ac.currentTime+2.5);
    hiss.connect(hHPF);hHPF.connect(hGain);hGain.connect(master);
    hiss.start();

    // 3) Deep thump at ignition
    const thump=ac.createOscillator();
    const tGain=ac.createGain();
    thump.type='sine';
    thump.frequency.setValueAtTime(80,ac.currentTime);
    thump.frequency.exponentialRampToValueAtTime(30,ac.currentTime+.3);
    tGain.gain.setValueAtTime(0,ac.currentTime);
    tGain.gain.linearRampToValueAtTime(.6,ac.currentTime+.02);
    tGain.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.35);
    thump.connect(tGain);tGain.connect(master);
    thump.start();thump.stop(ac.currentTime+.4);

    // 4) Triumphant fanfare on top
    const fanfare=[523.25,659.25,783.99,1046.50];
    fanfare.forEach((freq,i)=>{
      const osc=ac.createOscillator(),g=ac.createGain();
      osc.type='triangle';osc.frequency.value=freq;
      const t=ac.currentTime+.1+i*.11;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.15,t+.05);
      g.gain.exponentialRampToValueAtTime(.001,t+.5);
      osc.connect(g);g.connect(master);osc.start(t);osc.stop(t+.55);
      // harmonic shimmer
      const o2=ac.createOscillator(),g2=ac.createGain();
      o2.type='sine';o2.frequency.value=freq*2;
      g2.gain.setValueAtTime(0,t+.04);
      g2.gain.linearRampToValueAtTime(.05,t+.1);
      g2.gain.exponentialRampToValueAtTime(.001,t+.65);
      o2.connect(g2);g2.connect(master);o2.start(t+.04);o2.stop(t+.7);
    });
    // sustained chord
    [523.25,659.25,783.99].forEach((freq)=>{
      const osc=ac.createOscillator(),g=ac.createGain();
      osc.type='sine';osc.frequency.value=freq;
      const t=ac.currentTime+.65;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.07,t+.1);
      g.gain.exponentialRampToValueAtTime(.001,t+1.4);
      osc.connect(g);g.connect(master);osc.start(t);osc.stop(t+1.5);
    });
  } catch(e){}
}

function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇 Silencio':'🔊 Sonido';
  if(!muted) startAmbient();
}

// ── SCANNER LOGIC ──
function startScan(e){
  e.preventDefault();
  if(!canScan||isScanning) return;
  startAmbient();
  isScanning=true;scanStart=Date.now();
  const zone=document.getElementById('handZone');
  const circle=document.getElementById('progressCircle');
  zone.classList.add('scanning');
  document.getElementById('handIcon').textContent='🖐';
  document.getElementById('instruction').textContent='Escaneando... no muevas la mano';
  startScanSound();
  const circ=615;
  progInterval=setInterval(()=>{
    circle.style.strokeDashoffset=circ*(1-Math.min((Date.now()-scanStart)/HOLD_MS,1));
  },30);
  scanTimer=setTimeout(()=>{
    clearInterval(progInterval);
    stopScanSound();
    showApproved();
  },HOLD_MS);
  document.addEventListener('mouseup',cancelScan);
  document.addEventListener('touchend',cancelScan);
  document.addEventListener('touchcancel',cancelScan);
}

function cancelScan(){
  if(!isScanning) return;
  clearTimeout(scanTimer);clearInterval(progInterval);
  stopScanSound();
  isScanning=false;
  const zone=document.getElementById('handZone');
  const circle=document.getElementById('progressCircle');
  circle.style.strokeDashoffset=615;
  zone.classList.remove('scanning');
  document.getElementById('handIcon').textContent='✋';
  document.getElementById('instruction').textContent='Apoya tu mano en el escáner';
  document.removeEventListener('mouseup',cancelScan);
  document.removeEventListener('touchend',cancelScan);
  document.removeEventListener('touchcancel',cancelScan);
}

function showApproved(){
  isScanning=false;canScan=false;
  document.removeEventListener('mouseup',cancelScan);
  document.removeEventListener('touchend',cancelScan);
  const zone=document.getElementById('handZone');
  const circle=document.getElementById('progressCircle');
  circle.style.strokeDashoffset=0;circle.style.stroke='#00ff88';
  zone.classList.remove('scanning');zone.classList.add('success');
  document.getElementById('handIcon').textContent='🖐';
  document.getElementById('instruction').textContent='¡Identidad confirmada!';
  playRocketSound();
  spawnParticles();
  const title=TITLES[Math.floor(Math.random()*TITLES.length)];
  const id=String(Math.floor(Math.random()*900)+100);
  document.getElementById('resultSub').textContent=title+' · ID-'+id+' · ACCESO CONCEDIDO';
  // reset rocket animation
  const rocket=document.getElementById('resultRocket');
  rocket.style.animation='none';
  setTimeout(()=>{
    document.getElementById('resultOverlay').classList.add('show');
    rocket.style.animation='';
    setTimeout(()=>{
      document.getElementById('resultOverlay').classList.remove('show');
      setTimeout(resetScanner,400);
    },2800);
  },250);
}

function spawnParticles(){
  const pc=document.getElementById('particlesContainer');
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const cols=['#00ff88','#00d4ff','#ffcc00','#ffffff','#88ffcc','#ff88ff'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='particle';
    const angle=(Math.PI*2*i)/30+Math.random()*.4;
    const dist=70+Math.random()*150;
    const sz=4+Math.random()*8;
    const col=cols[Math.floor(Math.random()*cols.length)];
    p.style.cssText='left:'+cx+'px;top:'+cy+'px;width:'+sz+'px;height:'+sz+'px;background:'+col+';--dx:'+Math.cos(angle)*dist+'px;--dy:'+Math.sin(angle)*dist+'px;animation-duration:'+(0.7+Math.random()*.5)+'s;animation-delay:'+(Math.random()*.15)+'s';
    pc.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}

function resetScanner(){
  canScan=true;isScanning=false;
  const zone=document.getElementById('handZone');
  const circle=document.getElementById('progressCircle');
  zone.classList.remove('scanning','success');
  circle.style.strokeDashoffset=615;circle.style.stroke='#ffcc00';
  document.getElementById('handIcon').textContent='✋';
  document.getElementById('instruction').textContent='Apoya tu mano en el escáner';
}
